<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="25" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Operations Workflows: Sequential Process
  </text>

  <!-- Stock Box (Blue) -->
  <rect x="50" y="60" width="160" height="100" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="130" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#3B82F6">Stock</text>
  <text x="130" y="115" font-size="12" text-anchor="middle" fill="#3B82F6">Management</text>
  <text x="130" y="145" font-size="11" text-anchor="middle" fill="#666">Track Inventory</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="110" x2="250" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Manufacturing Box (Orange) -->
  <rect x="250" y="60" width="160" height="100" rx="8" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="2"/>
  <text x="330" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#F97316">Manufacturing</text>
  <text x="330" y="145" font-size="11" text-anchor="middle" fill="#666">Work Orders &amp; BOMs</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="110" x2="450" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Delivery Box (Green) -->
  <rect x="450" y="60" width="160" height="100" rx="8" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="2"/>
  <text x="530" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#22C55E">Delivery</text>
  <text x="530" y="115" font-size="12" text-anchor="middle" fill="#22C55E">Management</text>
  <text x="530" y="145" font-size="11" text-anchor="middle" fill="#666">Shipment &amp; Tracking</text>

  <!-- Legend -->
  <text x="50" y="190" font-size="12" font-weight="bold" fill="#1f2937">Flow:</text>
  <text x="120" y="190" font-size="11" fill="#666">Stock levels → Production orders → Customer fulfillment. Sequential workflow ensures inventory control.</text>
</svg>
