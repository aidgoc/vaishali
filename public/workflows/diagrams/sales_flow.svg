<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="25" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Sales Workflow: DCR → Lead → Opportunity → Quotation → Sales Order
  </text>

  <!-- DCR Box (Red) -->
  <rect x="30" y="60" width="130" height="90" rx="8" fill="#E60005" opacity="0.1" stroke="#E60005" stroke-width="2"/>
  <text x="95" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#E60005">Daily Call</text>
  <text x="95" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#E60005">Report</text>
  <text x="95" y="135" font-size="11" text-anchor="middle" fill="#666">(Field Staff)</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="105" x2="200" y2="105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Lead Box (Blue) -->
  <rect x="200" y="60" width="130" height="90" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="265" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#3B82F6">Lead</text>
  <text x="265" y="135" font-size="11" text-anchor="middle" fill="#666">(Auto-created)</text>

  <!-- Arrow 2 -->
  <line x1="330" y1="105" x2="370" y2="105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Opportunity Box (Green) -->
  <rect x="370" y="60" width="130" height="90" rx="8" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="2"/>
  <text x="435" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#22C55E">Opportunity</text>
  <text x="435" y="135" font-size="11" text-anchor="middle" fill="#666">(Sales Team)</text>

  <!-- Arrow 3 -->
  <line x1="500" y1="105" x2="540" y2="105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Quotation Box (Orange) -->
  <rect x="540" y="60" width="130" height="90" rx="8" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="2"/>
  <text x="605" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#F97316">Quotation</text>
  <text x="605" y="135" font-size="11" text-anchor="middle" fill="#666">(Sales Team)</text>

  <!-- Arrow 4 -->
  <line x1="670" y1="105" x2="710" y2="105" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Sales Order Box (Purple) -->
  <rect x="710" y="60" width="130" height="90" rx="8" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
  <text x="775" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B5CF6">Sales</text>
  <text x="775" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B5CF6">Order</text>
  <text x="775" y="135" font-size="11" text-anchor="middle" fill="#666">(Operations)</text>

  <!-- Legend -->
  <text x="30" y="185" font-size="12" font-weight="bold" fill="#1f2937">Legend:</text>

  <rect x="110" y="175" width="12" height="12" rx="2" fill="#E60005" opacity="0.7"/>
  <text x="130" y="184" font-size="11" fill="#1f2937">Customer Visit</text>

  <rect x="270" y="175" width="12" height="12" rx="2" fill="#3B82F6" opacity="0.7"/>
  <text x="290" y="184" font-size="11" fill="#1f2937">Lead Capture</text>

  <rect x="430" y="175" width="12" height="12" rx="2" fill="#22C55E" opacity="0.7"/>
  <text x="450" y="184" font-size="11" fill="#1f2937">Sales Opportunity</text>

  <rect x="590" y="175" width="12" height="12" rx="2" fill="#F97316" opacity="0.7"/>
  <text x="610" y="184" font-size="11" fill="#1f2937">Price Quote</text>

  <rect x="750" y="175" width="12" height="12" rx="2" fill="#8B5CF6" opacity="0.7"/>
  <text x="770" y="184" font-size="11" fill="#1f2937">Confirmed Order</text>
</svg>
