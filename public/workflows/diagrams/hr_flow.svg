<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .hr-box-text { font-size: 14px; font-weight: bold; }
      .hr-box-label { font-size: 11px; fill: #666; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="25" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">
    HR Workflows: Parallel Processes
  </text>

  <!-- Attendance Box (Red) -->
  <rect x="40" y="60" width="150" height="100" rx="8" fill="#E60005" opacity="0.1" stroke="#E60005" stroke-width="2"/>
  <text x="115" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#E60005">Attendance</text>
  <circle cx="115" cy="115" r="4" fill="#E60005"/>
  <text x="115" y="145" font-size="11" text-anchor="middle" fill="#666">Check-in / Out</text>

  <!-- Leave Box (Orange) -->
  <rect x="230" y="60" width="150" height="100" rx="8" fill="#F97316" opacity="0.1" stroke="#F97316" stroke-width="2"/>
  <text x="305" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#F97316">Leave</text>
  <circle cx="305" cy="120" r="4" fill="#F97316"/>
  <text x="305" y="145" font-size="11" text-anchor="middle" fill="#666">Request &amp; Approval</text>

  <!-- Expenses Box (Blue) -->
  <rect x="420" y="60" width="150" height="100" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="495" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#3B82F6">Expenses</text>
  <circle cx="495" cy="120" r="4" fill="#3B82F6"/>
  <text x="495" y="145" font-size="11" text-anchor="middle" fill="#666">Claims &amp; Approval</text>

  <!-- Advances Box (Green) -->
  <rect x="610" y="60" width="150" height="100" rx="8" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="2"/>
  <text x="685" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#22C55E">Advances</text>
  <circle cx="685" cy="115" r="4" fill="#22C55E"/>
  <text x="685" y="145" font-size="11" text-anchor="middle" fill="#666">Request &amp; Approval</text>

  <!-- Parallel indicator lines (dashed) -->
  <line x1="190" y1="150" x2="230" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="380" y1="150" x2="420" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="570" y1="150" x2="610" y2="150" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <text x="40" y="190" font-size="12" font-weight="bold" fill="#1f2937">Description:</text>
  <text x="200" y="190" font-size="11" fill="#666">All HR workflows run independently in parallel. Employees can submit requests, managers can approve.</text>
</svg>
