<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="25" font-size="18" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Field Workflow: Check-in → Visit → Outcomes → Auto-link
  </text>

  <!-- Check-in Box (Red) -->
  <rect x="40" y="60" width="140" height="100" rx="8" fill="#E60005" opacity="0.1" stroke="#E60005" stroke-width="2"/>
  <text x="110" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#E60005">Check-in</text>
  <text x="110" y="130" font-size="11" text-anchor="middle" fill="#666">GPS Location</text>
  <text x="110" y="145" font-size="11" text-anchor="middle" fill="#666">Captured</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="110" x2="220" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Visit Box (Blue) -->
  <rect x="220" y="60" width="140" height="100" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
  <text x="290" y="95" font-size="14" font-weight="bold" text-anchor="middle" fill="#3B82F6">Daily Call</text>
  <text x="290" y="115" font-size="14" font-weight="bold" text-anchor="middle" fill="#3B82F6">Report (DCR)</text>
  <text x="290" y="145" font-size="11" text-anchor="middle" fill="#666">Customer Details</text>

  <!-- Arrow 2 -->
  <line x1="360" y1="110" x2="400" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Outcomes Box (Green) -->
  <rect x="400" y="60" width="140" height="100" rx="8" fill="#22C55E" opacity="0.1" stroke="#22C55E" stroke-width="2"/>
  <text x="470" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#22C55E">Outcomes</text>
  <text x="470" y="130" font-size="11" text-anchor="middle" fill="#666">Lead / Opp / Order</text>
  <text x="470" y="145" font-size="11" text-anchor="middle" fill="#666">Checkboxes</text>

  <!-- Arrow 3 -->
  <line x1="540" y1="110" x2="580" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Auto-create Box (Purple) -->
  <rect x="580" y="60" width="140" height="100" rx="8" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
  <text x="650" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B5CF6">Auto-create</text>
  <text x="650" y="130" font-size="11" text-anchor="middle" fill="#666">Lead, Opportunity</text>
  <text x="650" y="145" font-size="11" text-anchor="middle" fill="#666">or Sales Order</text>

  <!-- Legend -->
  <text x="40" y="190" font-size="12" font-weight="bold" fill="#1f2937">Process:</text>
  <text x="140" y="190" font-size="11" fill="#666">Field staff captures visit data with GPS location, selects outcomes, and system automatically creates related sales documents.</text>
</svg>
