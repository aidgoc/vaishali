{%- extends "templates/web.html" -%}

{%- block page_content -%}
<style>
  /* Hide Frappe web chrome — full-screen PWA */
  .web-footer, .navbar, .page-header, .page-header-wrapper,
  footer, .website-footer { display: none !important; }
  .main-section { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
  .container { max-width: 100% !important; padding: 0 !important; }
  body { background: var(--bg-color, #fff); }
</style>

<div id="offline-banner" class="offline-banner" hidden>
  <span>You're offline — actions will sync when connected</span>
</div>

<div id="update-banner" class="update-banner" hidden>
  <span>New version available</span>
  <button id="update-btn" class="small">Update</button>
</div>

<main id="app" class="container app-container">
  <div aria-busy="true" data-spinner="overlay" style="min-height:60vh"></div>
</main>

<nav id="bottom-nav" class="bottom-nav" hidden>
  <!-- Dynamically built by app.js -->
</nav>

<script>
  // Boot context from Frappe (same pattern as HRMS/CRM)
  window.csrf_token = "{{ csrf_token }}";
  window.dspl_boot = {{ boot }};
  if (!window.frappe) window.frappe = {};
  window.frappe.csrf_token = "{{ csrf_token }}";
</script>

{%- set v = frappe.utils.now_datetime().strftime('%Y%m%d%H%M') -%}
<link rel="stylesheet" href="/assets/vaishali/field/style.css?v={{ v }}">
